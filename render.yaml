services:
  - type: web
    name: billing-anomaly-api
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python data/generate.py
      python models/train.py
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port 10000
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: web
    name: billing-anomaly-dashboard
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
    startCommand: streamlit run dashboard/app.py --server.port 10000 --server.address 0.0.0.0
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: API_URL
        value: https://billing-anomaly-api.onrender.com